services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: renderforge
      POSTGRES_PASSWORD: renderforge
      POSTGRES_DB: renderforge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renderforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3100:3100"
    environment:
      - NODE_ENV=production
      - PORT=3100
      - DATABASE_URL=postgresql://renderforge:renderforge@postgres:5432/renderforge
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-renderforge-production-secret}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-forgebase}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - renderforge-output:/app/output
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  renderforge-output:
