# RenderForge Studio — Coolify Deployment
# Domain: renderforge.endlessmaker.com

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: renderforge-api
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3100
      - DATABASE_URL=postgresql://${POSTGRES_USER:-renderforge}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@renderforge-db:5432/${POSTGRES_DB:-renderforge}
      - REDIS_URL=redis://renderforge-redis:6379
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT:-https://storage.endlessmaker.com}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:?Set S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY:?Set S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-forgebase}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://renderforge.endlessmaker.com}
      - SEED_PROJECTS=${SEED_PROJECTS:-yld,quran,linguaforge,kids}
    labels:
      - traefik.enable=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - renderforge_output:/app/output
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    networks:
      - renderforge-internal
      - coolify

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: renderforge-admin
    restart: always
    labels:
      - traefik.enable=false
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - renderforge-internal
      - coolify

  db:
    image: postgres:16-alpine
    container_name: renderforge-db
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-renderforge}
      - POSTGRES_USER=${POSTGRES_USER:-renderforge}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-renderforge} -d ${POSTGRES_DB:-renderforge}"]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - renderforge-internal

  redis:
    image: redis:7-alpine
    container_name: renderforge-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - renderforge-internal

networks:
  renderforge-internal:
    driver: bridge
  coolify:
    external: true

volumes:
  renderforge_output:
