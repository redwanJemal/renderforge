services:
  # No volumes — fresh DB each deploy, setup wizard seeds on first boot
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  api:
    environment:
      - NODE_ENV=production
      - PORT=3100
      - DATABASE_URL=postgresql://renderforge:renderforge@postgres:5432/renderforge
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-renderforge-production-secret}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-forgebase}
      - SEED_PROJECTS=${SEED_PROJECTS:-yld,quran,linguaforge,kids}

  admin:
    restart: on-failure
